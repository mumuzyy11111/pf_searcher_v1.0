<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PF 法术组合筛选</title>
    <link rel="stylesheet" href="assets/css/spell-filter.css?v=20260625-dual-v3">
    <link rel="stylesheet" href="assets/css/spell-view-switch.css?v=20260625-dual-v3">
</head>
<body>
<div class="page-shell">
    <header class="hero">
        <h1>PF 法术检索</h1>
        <nav class="top-links" aria-label="功能导航">
            <span class="nav-label">车卡器</span>
            <a href="index.html#character" target="_top">角色卡</a>
            <span class="nav-label">资料查询</span>
            <a class="active" href="index.html#spells" target="_top">法术</a>
            <a href="index.html#conditions" target="_top">状态</a>
            <a href="index.html#feats" target="_top">专长</a>
            <a href="index.html#classes" target="_top">职业</a>
            <a href="index.html#items" target="_top">奇物</a>
        </nav>
        <div class="view-switch" aria-label="法术检索视图">
            <span class="view-pill active">组合筛选</span>
            <a class="view-pill" href="spells.html?v=20260625-dual-v3" target="_self">名称 / 关键词 / 智能问答</a>
        </div>
    </header>

    <section class="search-card" aria-label="搜索与筛选">
        <div class="search-row">
            <label class="name-search">
                <span class="search-icon" aria-hidden="true">⌕</span>
                <input id="name-query" type="search" autocomplete="off" placeholder="搜索法术名称、来源或学派">
            </label>
            <button id="open-filter" class="filter-main-btn" type="button" aria-haspopup="dialog">
                <span aria-hidden="true">☷</span>
                筛选条件
                <span id="filter-count-badge" class="filter-count-badge hidden">0</span>
            </button>
        </div>

        <div class="quick-filter-row" aria-label="快捷筛选">
            <button class="quick-filter-btn" type="button" data-focus-section="profession-section">职业</button>
            <button class="quick-filter-btn" type="button" data-focus-section="school-section">学派</button>
            <button class="quick-filter-btn" type="button" data-focus-section="level-section">环位</button>
            <button id="clear-all" class="clear-btn hidden" type="button">清除全部</button>
        </div>
        <div id="active-filter-chips" class="active-filter-chips" aria-live="polite"></div>
    </section>

    <section class="result-heading">
        <div>
            <h2>法术结果</h2>
            <p id="result-summary">正在加载法术数据……</p>
        </div>
        <p class="pairing-note">职业与环位按同一条职业等级记录配对筛选</p>
    </section>

    <main id="result-workspace" class="result-workspace" aria-live="polite">
        <section class="result-list-panel">
            <div id="spell-list" class="spell-list"></div>
            <button id="load-more" class="load-more hidden" type="button">加载更多</button>
        </section>
        <aside id="detail-panel" class="detail-panel">
            <div class="detail-empty">
                <strong>选择一个法术</strong>
                <span>点击左侧结果查看完整详情。</span>
            </div>
        </aside>
    </main>
</div>

<div id="filter-modal" class="filter-modal hidden" role="dialog" aria-modal="true" aria-labelledby="filter-title">
    <div class="filter-backdrop" data-close-modal="true"></div>
    <section class="filter-dialog">
        <header class="filter-dialog-header">
            <button id="close-filter" class="icon-btn" type="button" aria-label="关闭筛选">×</button>
            <h2 id="filter-title">筛选条件</h2>
            <button id="reset-draft" class="text-btn" type="button">清空</button>
        </header>

        <div class="filter-dialog-body">
            <section id="profession-section" class="filter-section">
                <div class="section-heading">
                    <div>
                        <h3>职业</h3>
                        <p>可多选；同一分类内按“或”匹配。</p>
                    </div>
                    <input id="profession-search" class="mini-search" type="search" placeholder="查找职业">
                </div>
                <div id="profession-options" class="option-grid"></div>
            </section>

            <section id="school-section" class="filter-section">
                <div class="section-heading">
                    <div>
                        <h3>学派</h3>
                        <p>可同时选择多个学派。</p>
                    </div>
                </div>
                <div id="school-options" class="option-grid"></div>
            </section>

            <section id="level-section" class="filter-section">
                <div class="section-heading">
                    <div>
                        <h3>环位</h3>
                        <p>选择精确环位；和职业同时使用时按职业对应环位配对。</p>
                    </div>
                </div>
                <div id="level-options" class="level-grid"></div>
            </section>
        </div>

        <footer class="filter-dialog-footer">
            <span id="draft-match-count">正在计算……</span>
            <button id="apply-filter" class="apply-btn" type="button">显示结果</button>
        </footer>
    </section>
</div>

<script src="assets/js/spell-filter-core.js?v=20260625-dual-v3"></script>
<script src="assets/js/spell-filter.js?v=20260625-dual-v3"></script>
</body>
</html>
